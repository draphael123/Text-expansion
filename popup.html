<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SnapText</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --blue: #2563EB;
      --blue-light: #60A5FA;
      --blue-dark: #1D4ED8;
      --blue-bg: #EFF6FF;
      --blue-50: #DBEAFE;
      --bg: #FFFFFF;
      --bg-alt: #F8FAFC;
      --border: #E2E8F0;
      --text: #0F172A;
      --text-muted: #64748B;
    }

    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .header {
      background: var(--blue);
      color: #fff;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header .logo {
      width: 22px; height: 22px;
      background: rgba(255,255,255,0.15);
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }

    .header-actions { display: flex; gap: 6px; }

    .icon-btn {
      background: rgba(255,255,255,0.12);
      border: none;
      border-radius: 6px;
      width: 30px; height: 30px;
      color: #fff;
      cursor: pointer;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.2); }

    .stats-bar {
      display: flex;
      background: var(--blue-bg);
      border-bottom: 1px solid var(--blue-50);
      padding: 8px 18px;
      gap: 16px;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--blue);
      font-weight: 600;
    }

    .stat .num { font-size: 14px; font-weight: 700; }

    .search-bar {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
    }

    .search-bar input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 13px;
      outline: none;
      background: var(--bg-alt);
      transition: border-color 0.2s, background 0.2s;
    }
    .search-bar input:focus {
      border-color: var(--blue);
      background: var(--bg);
    }

    .section-label {
      padding: 8px 18px 4px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-muted);
    }

    .macro-list {
      max-height: 320px;
      overflow-y: auto;
    }

    .macro-item {
      display: flex;
      align-items: center;
      padding: 9px 18px;
      cursor: pointer;
      transition: background 0.1s;
      gap: 10px;
      position: relative;
    }
    .macro-item:hover { background: var(--blue-bg); }

    .macro-trigger {
      background: var(--bg-alt);
      color: var(--blue);
      font-family: 'SF Mono', Monaco, Consolas, monospace;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 7px;
      border-radius: 4px;
      white-space: nowrap;
      min-width: 52px;
      text-align: center;
      border: 1px solid var(--border);
    }

    .macro-body {
      flex: 1;
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .macro-count {
      font-size: 10px;
      color: var(--text-muted);
      background: var(--bg-alt);
      padding: 2px 6px;
      border-radius: 8px;
    }

    /* ── Hover preview tooltip ────────────────────────── */
    .macro-preview {
      display: none;
      position: absolute;
      left: 18px;
      top: 100%;
      width: calc(100% - 36px);
      background: var(--text);
      color: #E2E8F0;
      font-size: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      white-space: pre-wrap;
      word-wrap: break-word;
      max-height: 120px;
      overflow-y: auto;
      z-index: 10;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.3);
      line-height: 1.5;
      font-family: 'SF Mono', Monaco, Consolas, monospace;
      pointer-events: none;
    }

    .macro-preview .var-tag {
      color: var(--blue-light);
      font-weight: 600;
    }

    .macro-item:hover .macro-preview {
      display: block;
    }

    .empty-state {
      padding: 36px 20px;
      text-align: center;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 28px; margin-bottom: 8px; }
    .empty-state p { font-size: 13px; }

    .shortcut-hint {
      padding: 6px 18px;
      background: var(--bg-alt);
      border-top: 1px solid var(--border);
      font-size: 10px;
      color: var(--text-muted);
      text-align: center;
    }
    .shortcut-hint kbd {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 1px 5px;
      border-radius: 3px;
      font-family: inherit;
      font-size: 10px;
    }

    .footer {
      padding: 10px 18px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: var(--text-muted);
    }

    .footer a {
      color: var(--blue);
      text-decoration: none;
      font-weight: 600;
      font-size: 12px;
    }
    .footer a:hover { text-decoration: underline; }

    .sync-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
    }
    .sync-badge.online { background: #ECFDF5; color: #059669; }
    .sync-badge.offline { background: var(--bg-alt); color: var(--text-muted); }
    .sync-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
  </style>
</head>
<body>
  <div class="header">
    <h1><span class="logo">&#9889;</span> SnapText</h1>
    <div class="header-actions">
      <button class="icon-btn" id="btn-add" title="New macro">+</button>
      <button class="icon-btn" id="btn-dashboard" title="Dashboard">&#9881;</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat"><span class="num" id="stat-macros">0</span> macros</div>
    <div class="stat"><span class="num" id="stat-expansions">0</span> expansions today</div>
  </div>

  <div class="search-bar">
    <input type="text" id="search" placeholder="Search macros..." />
  </div>

  <div id="recent-section"></div>
  <div id="all-section"><div class="section-label">All Macros</div></div>
  <div class="macro-list" id="macro-list"></div>

  <div class="shortcut-hint">
    <kbd>Ctrl</kbd> + <kbd>Shift</kbd> + <kbd>Space</kbd> to search on any page
  </div>

  <div class="footer">
    <span id="sync-status"></span>
    <a href="#" id="btn-dashboard-link">Open Dashboard &rarr;</a>
  </div>

  <script>
    const macroListEl = document.getElementById('macro-list');
    const searchEl = document.getElementById('search');
    const recentSection = document.getElementById('recent-section');
    let allMacros = [];

    // Highlight variables in preview text
    function highlightVars(text) {
      return text
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/(\{\{[^}]+\}\})/g, '<span class="var-tag">$1</span>');
    }

    async function loadMacros() {
      let { macros = [], session, stats = {} } = await chrome.storage.local.get(['macros', 'session', 'stats']);

      // If no macros exist, trigger a reload from background to seed defaults
      if (!macros || macros.length === 0) {
        const result = await chrome.runtime.sendMessage({ type: 'GET_MACROS' });
        macros = result?.macros || [];
      }

      allMacros = macros.filter(m => m.enabled !== false);

      const today = new Date().toISOString().slice(0, 10);
      document.getElementById('stat-macros').textContent = allMacros.length;
      document.getElementById('stat-expansions').textContent = stats[today] || 0;

      // Recent macros
      const recent = [...allMacros]
        .filter(m => m.lastUsed)
        .sort((a, b) => (b.lastUsed || 0) - (a.lastUsed || 0))
        .slice(0, 3);

      if (recent.length > 0) {
        recentSection.innerHTML = '<div class="section-label">Recent</div>' +
          recent.map(m => macroItemHtml(m)).join('');
        document.getElementById('all-section').innerHTML = '<div class="section-label">All Macros</div>';
      } else {
        recentSection.innerHTML = '';
        document.getElementById('all-section').innerHTML = '';
      }

      renderMacros(allMacros);

      const syncEl = document.getElementById('sync-status');
      syncEl.innerHTML = session?.idToken
        ? '<span class="sync-badge online"><span class="sync-dot"></span>Synced</span>'
        : '<span class="sync-badge offline"><span class="sync-dot"></span>Local only</span>';
    }

    function macroItemHtml(m) {
      const previewText = m.body.length > 200 ? m.body.substring(0, 200) + '...' : m.body;
      return `<div class="macro-item" data-id="${m.id}" data-body="${escapeAttr(m.body)}">
        <span class="macro-trigger">;${escapeHtml(m.trigger)}</span>
        <span class="macro-body">${escapeHtml(m.body)}</span>
        ${m.useCount ? `<span class="macro-count">${m.useCount}x</span>` : ''}
        <div class="macro-preview">${highlightVars(previewText)}</div>
      </div>`;
    }

    function renderMacros(macros) {
      if (macros.length === 0) {
        macroListEl.innerHTML = `<div class="empty-state"><div class="icon">&#9889;</div><p>No macros yet. Click + to create one!</p></div>`;
        return;
      }
      macroListEl.innerHTML = macros.map(m => macroItemHtml(m)).join('');
    }

    function escapeHtml(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function escapeAttr(str) { return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    searchEl.addEventListener('input', () => {
      const q = searchEl.value.toLowerCase();
      const filtered = allMacros.filter(m =>
        m.trigger.toLowerCase().includes(q) ||
        m.body.toLowerCase().includes(q) ||
        (m.folder || '').toLowerCase().includes(q)
      );
      renderMacros(filtered);
      recentSection.style.display = q ? 'none' : '';
      document.getElementById('all-section').style.display = q ? 'none' : '';
    });

    document.addEventListener('click', async (e) => {
      const item = e.target.closest('.macro-item');
      if (!item) return;
      const body = item.dataset.body;
      const [tab] = await chrome.tabs.query({ active: true, currentWindow: true });
      if (tab) {
        chrome.tabs.sendMessage(tab.id, { type: 'INSERT_MACRO', body });
        window.close();
      }
    });

    document.getElementById('btn-dashboard').addEventListener('click', () => {
      chrome.runtime.openOptionsPage(); window.close();
    });
    document.getElementById('btn-dashboard-link').addEventListener('click', (e) => {
      e.preventDefault(); chrome.runtime.openOptionsPage(); window.close();
    });
    document.getElementById('btn-add').addEventListener('click', () => {
      chrome.tabs.create({ url: chrome.runtime.getURL('dashboard.html?add=true') }); window.close();
    });

    loadMacros();
  </script>
</body>
</html>
